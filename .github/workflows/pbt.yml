name: PBT
on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr:
        description: "Upstream gitcode PR number to replay"
        default: "11696"

# Self-hosted runner on oc.rustapp.uk (has the pi-pbt bun binary, provider
# auth in ~/.pi-pbt/agent, and the dashboard bridge). Campaign detail also
# streams live to the dashboard (localhost:8000 via SSH tunnel).
jobs:
  pbt:
    runs-on: [self-hosted, linux]
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: pi-pbt replay + PBT (streamed)
        env:
          PR: ${{ github.event.inputs.pr || '11696' }}
          PBT_LANG: zh
          PBT_SCAN_ROOT: ${{ github.workspace }}
        run: |
          set -o pipefail
          export PATH=/usr/local/bin:$PATH
          SESS="$HOME/.pi-pbt/agent/sessions"
          echo "::group::Stage 1 — replay: extract sub-requirement from PR#$PR, implement, commit"
          python3 .github/pbt-stream.py "$SESS" -- \
            pi-pbt replay --pr "$PR" --project openharmony/multimedia_media_library \
            --repo "$GITHUB_WORKSPACE" --lang zh --scan-root "$GITHUB_WORKSPACE"
          echo "::endgroup::"
          SHA=$(git rev-parse --short HEAD)
          echo "Implemented commit: $SHA"
          echo "::group::Stage 2 — PBT campaign (hook-run $SHA)"
          python3 .github/pbt-stream.py "$SESS" -- \
            pi-pbt hook-run "$SHA" --repo "$GITHUB_WORKSPACE" --lang zh --scan-root "$GITHUB_WORKSPACE"
          echo "::endgroup::"
          echo "::group::REPORT.md"
          cat "$GITHUB_WORKSPACE/pbt-out-hook/REPORT.md" 2>/dev/null | head -100 || echo "(no report)"
          echo "::endgroup::"
