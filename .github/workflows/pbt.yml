name: PBT
on:
  pull_request:

# Runs the PBT campaign against THIS PR's changes on the self-hosted runner
# (oc.rustapp.uk: pi-pbt bun binary, provider auth in ~/.pi-pbt/agent, dashboard
# bridge). This is only the PBT check — the implementation is produced upstream
# by `pi-pbt replay` (which opens the PR); the PR's Actions stage tests it.
# Live campaign progress streams here and to the dashboard (:8000).
jobs:
  pbt:
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # need base..head to know the PR's changes
      - name: pi-pbt PBT on PR changes (streamed)
        env:
          PBT_LANG: zh
          PBT_SCAN_ROOT: ${{ github.workspace }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -o pipefail
          export PATH=/usr/local/bin:$PATH
          SESS="$HOME/.pi-pbt/agent/sessions"
          SHA=$(git rev-parse --short "$HEAD_SHA")
          echo "PBT check for PR head $SHA"
          echo "::group::PBT campaign (hook-run $SHA)"
          python3 .github/pbt-stream.py "$SESS" -- \
            pi-pbt hook-run "$SHA" --repo "$GITHUB_WORKSPACE" --lang zh --scan-root "$GITHUB_WORKSPACE"
          echo "::endgroup::"
          echo "::group::REPORT.md"
          cat "$GITHUB_WORKSPACE/pbt-out-hook/REPORT.md" 2>/dev/null | head -100 || echo "(no report)"
          echo "::endgroup::"
